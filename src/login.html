<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <script src="scripts/crud-usuarios/login.js" defer></script>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="login-container">
        <img src="assets/images/logo.jpg" alt="">
        <form id="formulario">
            <div class="form">
                <input type="text" id="usuarioL" name="usuario" required placeholder="Usuário:">
            </div>
            <div class="form">
                <input type="password" id="senhaL" name="senha" required placeholder="Senha:">
            </div>
            <button type="submit">Login</button>
        </form>
    </div>
</body>
</html>
