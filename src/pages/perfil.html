<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="../styles/main.css">
  <script src="../scripts/utils.js" defer></script>
  <script src="../scripts/paginacao.js" defer></script>
  <script src="../scripts/main.js" defer></script>
  <script src="../scripts/crud-produtos/listar-produtos.js" defer></script>
  <script src="../scripts/crud-produtos/atualizar-produto.js" defer></script>
  <script src="../scripts/crud-produtos/remover-produto.js" defer></script>
  <title>SwapStore - Perfil</title>
</head>
<body data-pagina="perfil">
  <header class="site-header">
    <div class="top-green-line"></div>
    <div class="container header-content">
      <a class="brand" href="../index.html" aria-label="Ir para a Home">
        <img src="../assets/images/logo.jpg" alt="Logo da SwapStore">
      </a>

      <button class="menu-toggle" id="botaoMenu" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="navegacaoPrincipal" aria-label="Navegacao principal">
        <a href="../index.html" class="nav-link" data-pagina-link="inicio">Home</a>
        <a href="produto.html" class="nav-link" data-pagina-link="produto">Produto</a>
        <a href="carrinho.html" class="nav-link" data-pagina-link="carrinho">Carrinho</a>
<a href="publicar.html" class="nav-link" data-pagina-link="publicar">Publicar</a>
      </nav>

      <a class="profile-box" id="linkPerfil" href="perfil.html" aria-label="Ir para a pagina de perfil">
        <span class="profile-avatar"></span>
        <span class="profile-name">Name</span>
      </a>
    </div>
  </header>

  <main class="page-empty container">
    <h2>Meu Perfil</h2>

    <div class="perfil-tabs">
      <button class="perfil-tab is-active" id="tabProdutos">Meus Produtos</button>
      <button class="perfil-tab" id="tabHistorico">Minhas Compras</button>
    </div>

    <div id="painelProdutos">
      <p id="contadorProdutos" class="contador-produtos"></p>
      <div id="containerProdutos"></div>
    </div>

    <div id="painelHistorico" style="display:none;">
      <div id="containerHistorico"></div>
    </div>

    <div id="confirmBox" class="confirm-box" aria-hidden="true"></div>
    <button id="botaoLogout">Logout</button>
    <button id="btnConfigPerfil" class="btn-config" aria-label="Configurações">
      <img src="../assets/images/engrenagem.png" alt="config" />
    </button>
    <div id="popoverConfig" class="config-popover" aria-hidden="true">
      <div class="popover-inner" role="dialog" aria-label="Configurações do perfil">
        <div class="popover-header"><strong>Configurações</strong></div>
        <div class="popover-body">
          <button id="opcaoTrocarAvatar" class="opcao-config">Escolher foto de perfil</button>
          <div id="listaAvatares" class="lista-avatares" aria-hidden="true"></div>
          <button id="opcaoAlterarDados" class="opcao-config">Alterar nome e senha</button>
        </div>
      </div>
    </div>
  </main>

  <script>
    function abrirModalAtualizacao(produto) {
      var confirmBox = document.getElementById('confirmBox');
      if (!confirmBox) return;

      var precoFormatado = formatarMoedaBR(produto.preco || 0);
      confirmBox.innerHTML = '<div class="confirm-backdrop"></div>' +
        '<div class="confirm-content" role="dialog" aria-label="Atualizar produto">' +
        '<h3>Atualizar Produto</h3>' +
        '<form id="formAtualizarProduto" class="form-atualizar-produto">' +
        '<input type="text" id="atualizarNome" placeholder="Nome do Produto" value="' + (produto.nome || '').replace(/"/g, '&quot;') + '" required>' +
        '<input type="text" id="atualizarPreco" placeholder="R$ 0,00" value="' + precoFormatado + '" required>' +
        '<input type="number" id="atualizarQuantidade" min="1" value="' + (produto.quantidade || 1) + '" required>' +
        '<textarea id="atualizarDescricao" placeholder="Descrição">' + (produto.descricao || '') + '</textarea>' +
        '<input type="file" id="atualizarImagem" accept="image/*">' +
        '<div class="confirm-actions">' +
        '<button type="button" class="btn-cancelar" id="btnCancelarAtualizacao">Cancelar</button>' +
        '<button type="submit" class="btn-confirmar">Salvar</button>' +
        '</div>' +
        '</form>' +
        '</div>';

      confirmBox.classList.add('open');
      confirmBox.setAttribute('aria-hidden', 'false');

      document.getElementById('btnCancelarAtualizacao').addEventListener('click', fecharModalAtualizacao);
      confirmBox.querySelector('.confirm-backdrop').addEventListener('click', fecharModalAtualizacao);

      var inputPreco = document.getElementById('atualizarPreco');
      aplicarMascaraMoeda(inputPreco);

      document.getElementById('formAtualizarProduto').addEventListener('submit', function(e) {
        e.preventDefault();

        var nome = document.getElementById('atualizarNome').value.trim();
        var precoTexto = document.getElementById('atualizarPreco').value.trim();
        var quantidade = parseInt(document.getElementById('atualizarQuantidade').value, 10);
        var descricao = document.getElementById('atualizarDescricao').value.trim();
        var imagemInput = document.getElementById('atualizarImagem');
        var preco = lerPrecoComoNumero(precoTexto);

        if (!nome || isNaN(preco) || preco <= 0 || isNaN(quantidade) || quantidade < 1) {
          alert('Preencha os campos corretamente.');
          return;
        }

        function salvarAtualizacao(imagemData) {
          var novosDados = {
            nome: nome,
            preco: preco,
            quantidade: quantidade,
            descricao: descricao,
            status: quantidade > 0 ? 'disponivel' : 'indisponivel'
          };

          if (imagemData) {
            novosDados.imagem = imagemData;
          }

          var atualizado = atualizarProduto(produto.id_produto, novosDados);
          if (!atualizado) {
            alert('Não foi possível atualizar o produto.');
            return;
          }

          fecharModalAtualizacao();
          exibirMeusProdutos();
        }

        if (imagemInput && imagemInput.files && imagemInput.files[0]) {
          var leitor = new FileReader();
          leitor.onload = function(ev) {
            salvarAtualizacao(ev.target.result);
          };
          leitor.readAsDataURL(imagemInput.files[0]);
          return;
        }

        salvarAtualizacao(null);
      });
    }

    function fecharModalAtualizacao() {
      var confirmBox = document.getElementById('confirmBox');
      if (!confirmBox) return;
      confirmBox.classList.remove('open');
      confirmBox.setAttribute('aria-hidden', 'true');
      confirmBox.innerHTML = '';
    }

    function exibirMeusProdutos() {
      var id_usuario = localStorage.getItem('swapstore_usuario_logado');
      var todosProdutos = listarProdutosPorUsuario(id_usuario);
      var produtos = todosProdutos.filter(function(p) { return p.quantidade === undefined || p.quantidade > 0; });
      var container = document.getElementById('containerProdutos');
      var contador = document.getElementById('contadorProdutos');
      if (contador) contador.textContent = produtos.length + ' produto(s) à venda';
      container.innerHTML = '';
      
      produtos.forEach(function(produto) {
        var div = document.createElement('div');
        var imgSrc = produto.imagem && produto.imagem.length ? produto.imagem : '../assets/images/sem_imagem.jpg';
        div.className = 'produto-resumo-card';
        div.innerHTML = '<div class="produto-resumo-thumb"><img src="' + imgSrc + '" alt=""></div>' +
                        '<div class="produto-resumo-info">' +
                        '<strong>' + produto.nome + '</strong>' +
                        '<span>R$ ' + produto.preco.toFixed(2).replace('.', ',') + '</span>' +
                        '<p>' + (produto.descricao || 'Sem descrição') + '</p>' +
                        '</div>';
        var acoes = document.createElement('div');
        acoes.className = 'produto-acoes-card';

        var botaoAtualizar = document.createElement('button');
        botaoAtualizar.textContent = 'Atualizar';
        botaoAtualizar.className = 'botao-atualizar-produto';
        botaoAtualizar.onclick = function() {
          abrirModalAtualizacao(produto);
        };

        var botaoRemover = document.createElement('button');
        botaoRemover.textContent = 'Remover';
        botaoRemover.className = 'botao-remover-produto';
        botaoRemover.onclick = function() {
          if (confirm('Tem certeza?')) {
            removerProduto(produto.id_produto);
            exibirMeusProdutos();
          }
        };

        acoes.appendChild(botaoAtualizar);
        acoes.appendChild(botaoRemover);
        div.appendChild(acoes);
        container.appendChild(div);
      });
    }
    
    function exibirHistorico() {
      var idUsuario = localStorage.getItem('swapstore_usuario_logado');
      var historicoJSON = localStorage.getItem('swapstore_historico');
      var historico = historicoJSON ? JSON.parse(historicoJSON) : [];
      var minhasCompras = historico.filter(function(c) { return c.id_comprador === idUsuario; });
      var container = document.getElementById('containerHistorico');
      container.innerHTML = '';

      if (!minhasCompras.length) {
        container.innerHTML = '<div class="historico-vazio"><p>Você ainda não realizou nenhuma compra.</p><a href="../index.html" class="btn-voltar-home">Ver produtos</a></div>';
        return;
      }

      minhasCompras.slice().reverse().forEach(function(compra) {
        var data = new Date(compra.data);
        var dataFormatada = data.toLocaleDateString('pt-BR') + ' às ' + data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        var totalFormatado = 'R$ ' + compra.total.toFixed(2).replace('.', ',');

        var itensHTML = '';
        compra.itens.forEach(function(item) {
          var imgSrc = item.imagem && item.imagem.length ? item.imagem : '../assets/images/sem_imagem.jpg';
          var precoItem = 'R$ ' + item.preco.toFixed(2).replace('.', ',');
          itensHTML += '<div class="historico-produto">' +
            '<div class="historico-produto-thumb"><img src="' + imgSrc + '" alt=""></div>' +
            '<span class="historico-produto-nome">' + item.nome + ' x' + item.quantidade + '</span>' +
            '<span class="historico-produto-preco">' + precoItem + '</span>' +
            '</div>';
        });

        var div = document.createElement('div');
        div.className = 'historico-item';
        div.innerHTML = '<div class="historico-header">' +
          '<span class="historico-data">' + dataFormatada + '</span>' +
          '<span class="historico-total">' + totalFormatado + '</span>' +
          '</div>' +
          '<div class="historico-itens">' + itensHTML + '</div>';
        container.appendChild(div);
      });
    }

    function abrirModalAlterarDados() {
      var idUsuario = localStorage.getItem('swapstore_usuario_logado');
      var usuariosJSON = localStorage.getItem('swapstore_usuarios');
      var usuarios = usuariosJSON ? JSON.parse(usuariosJSON) : [];
      var usuarioAtual = null;
      for (var i = 0; i < usuarios.length; i++) {
        if (usuarios[i].id === idUsuario) { usuarioAtual = usuarios[i]; break; }
      }
      if (!usuarioAtual) return;

      var confirmBox = document.getElementById('confirmBox');
      confirmBox.innerHTML = '<div class="confirm-backdrop"></div>' +
        '<div class="confirm-content" role="dialog" aria-label="Alterar dados">' +
        '<h3>Alterar Nome e Senha</h3>' +
        '<form id="formAlterarDados" class="form-atualizar-produto">' +
        '<input type="text" id="alterarNome" placeholder="Novo nome" value="' + (usuarioAtual.usuario || '').replace(/"/g, '&quot;') + '" required>' +
        '<input type="password" id="alterarSenhaAtual" placeholder="Senha atual" required>' +
        '<input type="password" id="alterarNovaSenha" placeholder="Nova senha (deixe vazio para manter)">' +
        '<div class="confirm-actions">' +
        '<button type="button" id="btnCancelarAlterarDados" class="btn-cancelar">Cancelar</button>' +
        '<button type="submit" class="btn-confirmar">Salvar</button>' +
        '</div>' +
        '</form>' +
        '</div>';

      confirmBox.classList.add('open');
      confirmBox.setAttribute('aria-hidden', 'false');

      document.getElementById('btnCancelarAlterarDados').addEventListener('click', function() {
        confirmBox.classList.remove('open');
        confirmBox.setAttribute('aria-hidden', 'true');
        confirmBox.innerHTML = '';
      });
      confirmBox.querySelector('.confirm-backdrop').addEventListener('click', function() {
        confirmBox.classList.remove('open');
        confirmBox.setAttribute('aria-hidden', 'true');
        confirmBox.innerHTML = '';
      });

      document.getElementById('formAlterarDados').addEventListener('submit', function(e) {
        e.preventDefault();
        var novoNome = document.getElementById('alterarNome').value.trim();
        var senhaAtual = document.getElementById('alterarSenhaAtual').value;
        var novaSenha = document.getElementById('alterarNovaSenha').value;

        if (!novoNome) { alert('O nome não pode estar vazio.'); return; }
        if (senhaAtual !== usuarioAtual.senha) { alert('Senha atual incorreta.'); return; }

        var nomeOcupado = usuarios.some(function(u) {
          return u.usuario === novoNome && u.id !== idUsuario;
        });
        if (nomeOcupado) { alert('Este nome já está em uso.'); return; }

        var indice = usuarios.indexOf(usuarioAtual);
        usuarios[indice].usuario = novoNome;
        if (novaSenha) usuarios[indice].senha = novaSenha;
        localStorage.setItem('swapstore_usuarios', JSON.stringify(usuarios));

        if (window.atualizarNomePerfil) window.atualizarNomePerfil();
        confirmBox.classList.remove('open');
        confirmBox.setAttribute('aria-hidden', 'true');
        confirmBox.innerHTML = '';
        alert('Dados atualizados com sucesso!');
      });
    }

    function logout() {
      localStorage.removeItem('swapstore_usuario_logado');
      window.location.href = '../login.html';
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      document.getElementById('botaoLogout').addEventListener('click', logout);
      exibirMeusProdutos();

      var tabProdutos = document.getElementById('tabProdutos');
      var tabHistorico = document.getElementById('tabHistorico');
      var painelProdutos = document.getElementById('painelProdutos');
      var painelHistorico = document.getElementById('painelHistorico');

      tabProdutos.addEventListener('click', function() {
        tabProdutos.classList.add('is-active');
        tabHistorico.classList.remove('is-active');
        painelProdutos.style.display = '';
        painelHistorico.style.display = 'none';
      });

      tabHistorico.addEventListener('click', function() {
        tabHistorico.classList.add('is-active');
        tabProdutos.classList.remove('is-active');
        painelHistorico.style.display = '';
        painelProdutos.style.display = 'none';
        exibirHistorico();
      });
    });

    // Config popover logic (anchored to the button)
    document.addEventListener('DOMContentLoaded', function() {
      var btnConfig = document.getElementById('btnConfigPerfil');
      var popover = document.getElementById('popoverConfig');
      var opcaoAvatar = document.getElementById('opcaoTrocarAvatar');
      var opcaoAlterarDados = document.getElementById('opcaoAlterarDados');
      var lista = document.getElementById('listaAvatares');
      var avatars = ['avatar_aguia_vermelha.png','avatar_leao_azul.png','avatar_tubarao_amarelo.png'];

      function populateAvatars() {
        lista.innerHTML = '';
        avatars.forEach(function(nomeArquivo) {
          var img = document.createElement('img');
          img.src = '../assets/images/' + nomeArquivo;
          img.className = 'avatar-opcao';
          img.alt = nomeArquivo;
          img.addEventListener('click', function(e) {
            e.stopPropagation();
            var idUsuarioLogado = localStorage.getItem('swapstore_usuario_logado');
            if (!idUsuarioLogado) return alert('Nenhum usuário logado');
            var usuariosJSON = localStorage.getItem('swapstore_usuarios');
            var usuarios = usuariosJSON ? JSON.parse(usuariosJSON) : [];
            var indice = usuarios.findIndex(function(u){ return u.id === idUsuarioLogado; });
            if (indice === -1) return alert('Usuário não encontrado');
            usuarios[indice].avatar = nomeArquivo;
            localStorage.setItem('swapstore_usuarios', JSON.stringify(usuarios));
            if (window.atualizarNomePerfil) window.atualizarNomePerfil();
            if (window.aplicarAvatarPerfil) window.aplicarAvatarPerfil();
            popover.classList.remove('open');
            popover.setAttribute('aria-hidden','true');
            lista.innerHTML = '';
            lista.setAttribute('aria-hidden','true');
          });
          lista.appendChild(img);
        });
        lista.setAttribute('aria-hidden','false');
      }

      btnConfig.addEventListener('click', function(e) {
        e.stopPropagation();
        if (popover.classList.contains('open')) {
          popover.classList.remove('open');
          popover.setAttribute('aria-hidden','true');
          lista.innerHTML = '';
          lista.setAttribute('aria-hidden','true');
        } else {
          // open popover but do not populate avatars yet
          popover.classList.add('open');
          popover.setAttribute('aria-hidden','false');
          lista.innerHTML = '';
          lista.setAttribute('aria-hidden','true');
        }
      });

      // When clicking the 'Escolher foto de perfil' button, show/hide avatars
      opcaoAvatar.addEventListener('click', function(e) {
        e.stopPropagation();
        if (lista.getAttribute('aria-hidden') === 'true') {
          populateAvatars();
        } else {
          lista.innerHTML = '';
          lista.setAttribute('aria-hidden','true');
        }
      });

      opcaoAlterarDados.addEventListener('click', function(e) {
        e.stopPropagation();
        popover.classList.remove('open');
        popover.setAttribute('aria-hidden','true');
        lista.innerHTML = '';
        lista.setAttribute('aria-hidden','true');
        abrirModalAlterarDados();
      });

      // Close popover when clicking outside
      document.addEventListener('click', function(ev) {
        var target = ev.target;
        if (!popover.contains(target) && target !== btnConfig) {
          if (popover.classList.contains('open')) {
            popover.classList.remove('open');
            popover.setAttribute('aria-hidden','true');
            lista.innerHTML = '';
            lista.setAttribute('aria-hidden','true');
          }
        }
      });

      // Prevent clicks inside the popover from closing it
      popover.addEventListener('click', function(e) { e.stopPropagation(); });
    });
  </script>
</body>
</html>
