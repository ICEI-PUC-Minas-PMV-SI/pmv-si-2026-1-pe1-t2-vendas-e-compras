<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="styles/main.css">
  <script>
    if (!localStorage.getItem('swapstore_usuario_logado')) {
      window.location.href = 'pages/login.html';
    }
  </script>
  <script src="scripts/paginacao.js" defer></script>
  <script src="scripts/main.js" defer></script>
  <script src="scripts/crud-produtos/listar-produtos.js" defer></script>
  <title>SwapStore - Home</title>
</head>
<body data-pagina="inicio">
  <header class="site-header">
    <div class="top-green-line"></div>
    <div class="container header-content">
      <a class="brand" href="index.html" aria-label="Ir para a Home">
        <img src="assets/images/logo.jpg" alt="Logo da SwapStore">
      </a>

      <button class="menu-toggle" id="botaoMenu" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="navegacaoPrincipal" aria-label="Navegacao principal">
        <a href="index.html" class="nav-link" data-pagina-link="inicio">Home</a>
        <a href="pages/produto.html" class="nav-link" data-pagina-link="produto">Produto</a>
        <a href="pages/carrinho.html" class="nav-link" data-pagina-link="carrinho">Carrinho</a>
        <a href="pages/acompanhar.html" class="nav-link" data-pagina-link="acompanhar">Acompanhar</a>
        <a href="pages/publicar.html" class="nav-link" data-pagina-link="publicar">Publicar</a>
      </nav>

      <a class="profile-box" id="linkPerfil" href="pages/perfil.html" aria-label="Ir para a pagina de perfil">
        <span class="profile-avatar"></span>
        <span class="profile-name">Name</span>
      </a>
    </div>
  </header>

  <main class="page-empty container">
    <h2>Todos os Produtos</h2>
    <div id="containerProdutos"></div>
  </main>

  <script>
    function exibirProdutos() {
      var produtos = listarProdutos();
      var container = document.getElementById('containerProdutos');
      container.innerHTML = '';
      container.style.display = 'grid';
      container.style.gridTemplateColumns = 'repeat(2, minmax(520px, 1fr))';
      container.style.gap = '18px';
      container.style.maxWidth = '1180px';
      container.style.margin = '0 auto';
      
      produtos.forEach(function(produto) {
        var div = document.createElement('div');
        var imgSrc = produto.imagem && produto.imagem.length ? produto.imagem : 'assets/images/sem_imagem.jpg';
        div.className = 'home-product-card';
        div.style.display = 'grid';
        div.style.gridTemplateColumns = '96px minmax(0, 1fr)';
        div.style.alignItems = 'center';
        div.style.gap = '12px';
        div.style.minHeight = '128px';
        div.style.width = '100%';
        div.innerHTML = '<div class="home-product-thumb"><img src="' + imgSrc + '" alt=""></div>' +
                        '<div class="home-product-body">' +
                        '<div class="home-product-info">' +
                        '<strong>' + produto.nome + '</strong>' +
                        '<span>R$ ' + produto.preco.toFixed(2).replace('.', ',') + '</span>' +
                        '<p>' + (produto.descricao || 'Sem descrição') + '</p>' +
                        '</div>' +
                        '<a href="pages/produto.html?id=' + produto.id_produto + '" class="home-product-action">Visualizar</a>' +
                        '</div>';

        var thumb = div.querySelector('.home-product-thumb');
        var body = div.querySelector('.home-product-body');
        var info = div.querySelector('.home-product-info');
        var desc = info ? info.querySelector('p') : null;
        var action = div.querySelector('.home-product-action');

        if (thumb) {
          thumb.style.width = '78px';
          thumb.style.height = '98px';
          thumb.style.flex = '0 0 78px';
        }

        if (body) {
          body.style.display = 'flex';
          body.style.flexDirection = 'column';
          body.style.justifyContent = 'space-between';
          body.style.gap = '6px';
          body.style.minWidth = '0';
        }

        if (info) {
          info.style.display = 'flex';
          info.style.flexDirection = 'column';
          info.style.gap = '4px';
          info.style.minWidth = '0';
        }

        if (desc) {
          desc.style.display = '-webkit-box';
          desc.style.webkitBoxOrient = 'vertical';
          desc.style.webkitLineClamp = '2';
          desc.style.overflow = 'hidden';
        }

        if (action) {
          action.style.alignSelf = 'flex-start';
        }

        container.appendChild(div);
      });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      exibirProdutos();
    });
  </script>
</body>
</html>
