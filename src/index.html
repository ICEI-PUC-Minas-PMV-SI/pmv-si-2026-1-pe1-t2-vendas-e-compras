<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="styles/main.css">
  <script>
    if (!localStorage.getItem('swapstore_usuario_logado')) {
      window.location.href = 'pages/login.html';
    }
  </script>
  <script src="scripts/paginacao.js" defer></script>
  <script src="scripts/main.js" defer></script>
  <script src="scripts/crud-produtos/listar-produtos.js" defer></script>
  <title>SwapStore - Home</title>
</head>
<body data-pagina="inicio">
  <header class="site-header">
    <div class="top-green-line"></div>
    <div class="container header-content">
      <a class="brand" href="index.html" aria-label="Ir para a Home">
        <img src="assets/images/logo.jpg" alt="Logo da SwapStore">
      </a>

      <button class="menu-toggle" id="botaoMenu" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="navegacaoPrincipal" aria-label="Navegacao principal">
        <a href="index.html" class="nav-link" data-pagina-link="inicio">Home</a>
        <a href="pages/produto.html" class="nav-link" data-pagina-link="produto">Produto</a>
        <a href="pages/carrinho.html" class="nav-link" data-pagina-link="carrinho">Carrinho</a>
        <a href="pages/acompanhar.html" class="nav-link" data-pagina-link="acompanhar">Acompanhar</a>
        <a href="pages/publicar.html" class="nav-link" data-pagina-link="publicar">Publicar</a>
      </nav>

      <a class="profile-box" id="linkPerfil" href="pages/perfil.html" aria-label="Ir para a pagina de perfil">
        <span class="profile-avatar"></span>
        <span class="profile-name">Name</span>
      </a>
    </div>
  </header>

  <main class="page-empty container">
    <h2>Todos os Produtos</h2>
    <div id="containerProdutos"></div>
    <pre id="produtosJSON"></pre>
  </main>

  <script>
    function exibirProdutos() {
      var produtos = listarProdutos();
      var container = document.getElementById('containerProdutos');
      container.innerHTML = '';
      
      produtos.forEach(function(produto) {
        var div = document.createElement('div');
        div.style.border = '1px solid #ccc';
        div.style.padding = '10px';
        div.style.marginBottom = '10px';
        div.innerHTML = '<strong>' + produto.nome + '</strong> - R$ ' + produto.preco + '<br>' + produto.descricao + '<br>';
        var botaoDetalhes = document.createElement('a');
        botaoDetalhes.href = 'pages/produto.html?id=' + produto.id_produto;
        botaoDetalhes.textContent = 'Ver Detalhes';
        botaoDetalhes.style.display = 'inline-block';
        botaoDetalhes.style.marginTop = '5px';
        botaoDetalhes.style.padding = '5px 10px';
        botaoDetalhes.style.backgroundColor = '#5d10b9';
        botaoDetalhes.style.color = '#fff';
        botaoDetalhes.style.textDecoration = 'none';
        botaoDetalhes.style.borderRadius = '4px';
        div.appendChild(botaoDetalhes);
        container.appendChild(div);
      });
      
      document.getElementById('produtosJSON').textContent = JSON.stringify(produtos, null, 2);
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      exibirProdutos();
    });
  </script>
</body>
</html>
