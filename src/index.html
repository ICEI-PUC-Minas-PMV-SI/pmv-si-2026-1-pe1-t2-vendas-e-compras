<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="styles/main.css">
  <script>
    if (!localStorage.getItem('swapstore_usuario_logado')) {
      window.location.href = 'login.html';
    }
  </script>
  <script src="scripts/utils.js" defer></script>
  <script src="scripts/paginacao.js" defer></script>
  <script src="scripts/main.js" defer></script>
  <script src="scripts/crud-produtos/listar-produtos.js" defer></script>
  <title>SwapStore - Home</title>
</head>
<body data-pagina="inicio">
  <header class="site-header">
    <div class="top-green-line"></div>
    <div class="container header-content">
      <a class="brand" href="index.html" aria-label="Ir para a Home">
        <img src="assets/images/logo.jpg" alt="Logo da SwapStore">
      </a>

      <button class="menu-toggle" id="botaoMenu" aria-label="Abrir menu" aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" id="navegacaoPrincipal" aria-label="Navegacao principal">
        <a href="index.html" class="nav-link" data-pagina-link="inicio">Home</a>
        <a href="pages/produto.html" class="nav-link" data-pagina-link="produto">Produto</a>
        <a href="pages/carrinho.html" class="nav-link" data-pagina-link="carrinho">Carrinho</a>
        <a href="pages/publicar.html" class="nav-link" data-pagina-link="publicar">Publicar</a>
      </nav>

      <a class="profile-box" id="linkPerfil" href="pages/perfil.html" aria-label="Ir para a pagina de perfil">
        <span class="profile-avatar"></span>
        <span class="profile-name">Name</span>
      </a>
    </div>
  </header>

  <main class="page-empty container">
    <h2>Todos os Produtos</h2>
    <div class="home-controles">
      <input type="text" id="buscaProduto" class="home-busca" placeholder="Buscar produto...">
      <select id="ordenarProduto" class="home-ordenar">
        <option value="recente">Mais recente</option>
        <option value="menor">Menor preço</option>
        <option value="maior">Maior preço</option>
      </select>
    </div>
    <div id="containerProdutos"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-content">
      <span class="footer-brand">SwapStore</span>
      <span class="footer-tagline">Compre e venda com quem você conhece</span>
      <span class="footer-copy">© 2026 · PUC Minas</span>
    </div>
  </footer>

  <script>
    function exibirProdutos() {
      var busca = (document.getElementById('buscaProduto').value || '').toLowerCase().trim();
      var ordem = document.getElementById('ordenarProduto').value;
      var todos = listarProdutos();

      var produtos = busca ? todos.filter(function(p) {
        return p.nome.toLowerCase().indexOf(busca) !== -1 ||
               (p.descricao || '').toLowerCase().indexOf(busca) !== -1;
      }) : todos;

      if (ordem === 'menor') {
        produtos.sort(function(a, b) { return a.preco - b.preco; });
      } else if (ordem === 'maior') {
        produtos.sort(function(a, b) { return b.preco - a.preco; });
      } else {
        produtos.sort(function(a, b) { return new Date(b.criado_em) - new Date(a.criado_em); });
      }

      var container = document.getElementById('containerProdutos');
      container.innerHTML = '';

      if (!produtos.length) {
        container.style.display = 'block';
        container.innerHTML = '<div class="home-vazio">' +
          (busca
            ? '<p>Nenhum resultado para <strong>"' + busca + '"</strong>.</p>'
            : '<p>Nenhum produto disponível no momento.</p><a href="pages/publicar.html" class="btn-voltar-home">Publicar produto</a>') +
          '</div>';
        return;
      }

      container.style.display = '';

      produtos.forEach(function(produto) {
        var div = document.createElement('div');
        var imgSrc = produto.imagem && produto.imagem.length ? produto.imagem : 'assets/images/sem_imagem.jpg';
        div.className = 'home-product-card';
        div.innerHTML = '<div class="home-product-thumb"><img src="' + imgSrc + '" alt=""></div>' +
                        '<div class="home-product-body">' +
                        '<div class="home-product-info">' +
                        '<strong>' + produto.nome + '</strong>' +
                        '<span>' + formatarMoedaBR(produto.preco) + '</span>' +
                        '<p>' + (produto.descricao || 'Sem descrição') + '</p>' +
                        '</div>' +
                        '<a href="pages/produto.html?id=' + produto.id_produto + '" class="home-product-action">Visualizar</a>' +
                        '</div>';
        container.appendChild(div);
      });
    }
    
    document.addEventListener('DOMContentLoaded', function() {
      exibirProdutos();
      document.getElementById('buscaProduto').addEventListener('input', exibirProdutos);
      document.getElementById('ordenarProduto').addEventListener('change', exibirProdutos);
    });
  </script>
</body>
</html>
